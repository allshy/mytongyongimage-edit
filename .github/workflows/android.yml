name: Android Debug APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Run unit tests
        continue-on-error: true
        run: |
          gradle :app:testDebugUnitTest --stacktrace 2>&1 | tee test.log
          exit ${PIPESTATUS[0]}

      - name: Build Debug APK
        run: |
          gradle :app:assembleDebug --stacktrace 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            while IFS= read -r line; do
              echo "::error::$line"
            done < <(tail -n 80 build.log)
          fi
          exit "$status"

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            test.log
            build.log

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-image-client-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
